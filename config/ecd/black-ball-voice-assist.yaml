esphome:
  friendly_name: Black ball voice assist
  name: black-ball-voice-assist
  area: "Bedroom"
  comment: "Bedroom Black Ball"

esp32:
  variant: esp32s3
  board: "esp32-s3-devkitc-1"
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Black ball voice assist Fallback"
    password: "2c1pBl605EZ7"

captive_portal:

ota:
  - platform: esphome
    password: "df421fe9c9e9627cfef5277829255eed"

api:
  encryption:
    key: "+M9lufzT6w1riKStmZE2x3mwGqPeN6zBQgBd02opyis="

logger:
  level: DEBUG

i2c:
  sda:
  scl:
  id: i2c_id

i2s_audio:
  i2s_lrclk_pin: GPIO5
  i2s_bclk_pin: GPIO2

audio_dac:
  - address: "0x18"
    i2c_id: i2c_id
    platform: es8311

speaker:
  - platform: i2s_audio
    dac_type: external
    i2s_dout_pin:

micro_wake_word:
  - id: mww
    microphone: i2s_mic
    models:
    dac_type: external

microphone:
  - platform: i2s_audio
    adc_type: external
    i2s_din_pin:
    id: i2s_mic

binary_sensor:
  - platform: cap1188
    channel: 0
    id: touch_button
    device_class: "button"
    icon: "mdi:gesture-tap"

media_player:
  - platform: i2s_audio
    name: "media_player"
    dac_type: external
    i2s_dout_pin: GPIO8
    adc_type: external

select:
  - platform: template
    name: "Wake word sensitivity"
    optimistic: true
    restore_value: true
    initial_option: "Slightly sensitive"
    options:
      - Moderately sensitive
      - Very sensitive
